<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>迭代统计 · Sprint 24</title>
<link rel="stylesheet" href="styles.css">
<style>
  .st-body{flex:1;min-height:0;overflow:auto;padding:24px 26px 32px}
  .metric-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);border-radius:var(--r-card);background:var(--paper-raised);overflow:hidden;margin-bottom:24px}
  .metric-strip > div{padding:20px 24px;border-right:1px solid var(--rule)}
  .metric-strip > div:last-child{border-right:0}
  .grid2{display:grid;grid-template-columns:1.7fr 1fr;gap:22px}
  .vbar{display:flex;align-items:flex-end;gap:14px;height:150px;padding:0 4px;border-bottom:1px solid var(--rule-2)}
  .vbar .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .vbar .bar{width:100%;max-width:34px;border-radius:3px 3px 0 0;position:relative}
  .vbar .v{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-family:var(--serif);font-size:13px;font-weight:600}
  .vlbl{font-size:10px;color:var(--ink-3);letter-spacing:.04em}
  .legend{display:flex;gap:16px;align-items:center;font-size:11px;color:var(--ink-2)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:14px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .dist-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--rule)}
  .dist-row:last-child{border-bottom:0}
  .dist-bar{flex:1;height:7px;border-radius:4px;background:var(--paper-2);overflow:hidden}
  .dist-bar i{display:block;height:100%;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div id="side" data-active="stats"></div>
  <div class="main">
    <header class="top">
      <div class="top-title">
        <h1>迭代统计</h1>
        <div class="sub"><span>Sprint 24 · 搜索体验重构</span><span>·</span><span>第 7 / 10 天</span></div>
      </div>
      <div class="top-sp"></div>
      <div class="feishu-dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>每日 18:00 推送至群</div>
      <button class="btn btn-ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>导出周报</button>
    </header>

    <div class="st-body">
      <!-- 指标条 -->
      <div class="metric-strip">
        <div>
          <div class="label" style="margin-bottom:9px">已完成 / 计划</div>
          <div><span class="stat-num" style="font-size:40px">47</span><span class="stat-num" style="font-size:22px;color:var(--ink-3)"> / 68</span></div>
          <div style="font-size:11px;margin-top:5px"><span class="num" style="color:var(--st-done)">69%</span> <span class="muted">故事点燃尽</span></div>
        </div>
        <div>
          <div class="label" style="margin-bottom:9px">剩余</div>
          <div><span class="stat-num" style="font-size:40px">21</span><span style="font-size:14px;color:var(--ink-3)"> pt · 6 工单</span></div>
          <div style="font-size:11px;margin-top:5px"><span class="num" style="color:var(--st-doing)">3.5</span> <span class="muted">pt/天 需达成</span></div>
        </div>
        <div>
          <div class="label" style="margin-bottom:9px">预计完成</div>
          <div><span class="stat-num" style="font-size:40px;color:var(--st-done)">准时</span></div>
          <div style="font-size:11px;margin-top:5px"><span class="muted">按当前速度 · 第</span> <span class="num">10</span> <span class="muted">天</span></div>
        </div>
        <div>
          <div class="label" style="margin-bottom:9px">未解决缺陷</div>
          <div><span class="stat-num" style="font-size:40px;color:var(--st-block)">9</span><span style="font-size:14px;color:var(--ink-3)"> 个</span></div>
          <div style="font-size:11px;margin-top:5px"><span class="delta down">▲ 2</span> <span class="muted">较昨日 · 1 阻塞</span></div>
        </div>
      </div>

      <div class="grid2">
        <!-- 燃尽图 -->
        <div class="panel">
          <div class="panel-h">
            <h3>故事点燃尽</h3>
            <div class="legend">
              <span><i style="border-color:var(--ink-3);border-top-style:dashed"></i>理想</span>
              <span><i style="border-color:var(--accent)"></i>实际</span>
              <span><i style="border-color:var(--st-review);border-top-style:dotted"></i>预测</span>
            </div>
          </div>
          <svg viewBox="0 0 640 280" style="width:100%;height:auto;display:block">
            <!-- 网格 -->
            <g stroke="var(--rule)" stroke-width="1">
              <line x1="50" y1="30" x2="50" y2="250"/>
              <line x1="50" y1="250" x2="610" y2="250"/>
              <line x1="50" y1="195" x2="610" y2="195" stroke="var(--rule)" opacity=".6"/>
              <line x1="50" y1="140" x2="610" y2="140" stroke="var(--rule)" opacity=".6"/>
              <line x1="50" y1="85" x2="610" y2="85" stroke="var(--rule)" opacity=".6"/>
            </g>
            <!-- Y 轴标 -->
            <g fill="var(--ink-3)" font-size="10" font-family="Newsreader,serif" text-anchor="end">
              <text x="42" y="34">68</text><text x="42" y="89">51</text>
              <text x="42" y="144">34</text><text x="42" y="199">17</text><text x="42" y="254">0</text>
            </g>
            <!-- X 轴标 -->
            <g fill="var(--ink-3)" font-size="10" font-family="Newsreader,serif" text-anchor="middle">
              <text x="50" y="266">D0</text><text x="218" y="266">D3</text>
              <text x="386" y="266">D6</text><text x="442" y="266" fill="var(--accent)" font-weight="600">今天</text>
              <text x="610" y="266">D10</text>
            </g>
            <!-- 理想线 -->
            <line x1="50" y1="30" x2="610" y2="250" stroke="var(--ink-3)" stroke-width="1.5" stroke-dasharray="5 4" opacity=".55"/>
            <!-- 实际填充 -->
            <path d="M50,30 L106,43 L162,56 L218,75 L274,95 L330,121 L386,150 L442,182 L442,250 L50,250 Z" fill="var(--accent)" opacity=".06"/>
            <!-- 实际线 -->
            <polyline points="50,30 106,43 162,56 218,75 274,95 330,121 386,150 442,182" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
            <!-- 预测线 -->
            <polyline points="442,182 610,250" fill="none" stroke="var(--st-review)" stroke-width="2" stroke-dasharray="2 4" opacity=".8"/>
            <!-- 数据点 -->
            <g fill="var(--paper-raised)" stroke="var(--accent)" stroke-width="2">
              <circle cx="50" cy="30" r="3"/><circle cx="162" cy="56" r="3"/><circle cx="274" cy="95" r="3"/><circle cx="330" cy="121" r="3"/><circle cx="386" cy="150" r="3"/>
            </g>
            <circle cx="442" cy="182" r="5" fill="var(--accent)"/>
            <text x="442" y="172" fill="var(--accent)" font-size="13" font-family="Newsreader,serif" font-weight="600" text-anchor="middle">21</text>
          </svg>
        </div>

        <!-- 右列 -->
        <div style="display:flex;flex-direction:column;gap:22px">
          <div class="panel" style="padding:18px 20px">
            <div class="panel-h" style="margin-bottom:14px"><h3>近五迭代速度</h3><span class="label">pt / 迭代</span></div>
            <div class="vbar">
              <div class="col"><div class="bar" style="height:62%;background:var(--rule-2)"><span class="v" style="color:var(--ink-3)">42</span></div></div>
              <div class="col"><div class="bar" style="height:75%;background:var(--rule-2)"><span class="v" style="color:var(--ink-3)">51</span></div></div>
              <div class="col"><div class="bar" style="height:56%;background:var(--rule-2)"><span class="v" style="color:var(--ink-3)">38</span></div></div>
              <div class="col"><div class="bar" style="height:72%;background:var(--rule-2)"><span class="v" style="color:var(--ink-3)">49</span></div></div>
              <div class="col"><div class="bar" style="height:69%;background:var(--accent)"><span class="v" style="color:var(--accent)">47</span></div></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:8px">
              <span class="vlbl">S20</span><span class="vlbl">S21</span><span class="vlbl">S22</span><span class="vlbl">S23</span><span class="vlbl" style="color:var(--accent);font-weight:600">S24</span>
            </div>
            <div class="hairline" style="margin:14px 0"></div>
            <div style="font-size:11.5px;color:var(--ink-2)">平均速度 <span class="num" style="color:var(--ink);font-size:14px">45.4</span> pt · 本迭代预估 <span class="num" style="color:var(--ink);font-size:14px">68</span> pt</div>
          </div>

          <div class="panel" style="padding:18px 20px">
            <div class="panel-h" style="margin-bottom:6px"><h3>工作项分布</h3></div>
            <div class="dist-row">
              <span class="badge b-done" style="min-width:64px;justify-content:center"><span class="dot"></span>已完成</span>
              <div class="dist-bar"><i style="width:42%;background:var(--st-done)"></i></div>
              <span class="num" style="font-size:14px;width:26px;text-align:right">14</span>
            </div>
            <div class="dist-row">
              <span class="badge b-doing" style="min-width:64px;justify-content:center"><span class="dot"></span>进行中</span>
              <div class="dist-bar"><i style="width:24%;background:var(--st-doing)"></i></div>
              <span class="num" style="font-size:14px;width:26px;text-align:right">8</span>
            </div>
            <div class="dist-row">
              <span class="badge b-review" style="min-width:64px;justify-content:center"><span class="dot"></span>评审/测试</span>
              <div class="dist-bar"><i style="width:18%;background:var(--st-review)"></i></div>
              <span class="num" style="font-size:14px;width:26px;text-align:right">6</span>
            </div>
            <div class="dist-row">
              <span class="badge b-todo" style="min-width:64px;justify-content:center"><span class="dot"></span>待办</span>
              <div class="dist-bar"><i style="width:12%;background:var(--st-todo)"></i></div>
              <span class="num" style="font-size:14px;width:26px;text-align:right">4</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="shell.js"></script>
</body>
</html>
