<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看板 · Sprint 24</title>
<link rel="stylesheet" href="styles.css">
<style>
  .board-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
</style>
</head>
<body>
<script src="cfg.js"></script>
<div class="app" id="app">

  <!-- 侧栏由 shell.js 注入 -->
  <div id="side" data-active="board"></div>

  <!-- ===================== 主区 ===================== -->
  <div class="main">
    <!-- 顶栏 -->
    <header class="top">
      <div class="sprint-chip">
        <span class="sp-no">24</span>
        <div class="sp-tt">
          <b>搜索体验重构</b>
          <span>06/02 – 06/13 · 第 7 天</span>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" style="width:15px;height:15px"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="top-title">
        <div class="sub">
          <span class="num" style="font-size:13px;color:var(--ink-2)">还剩 6 天</span>
          <span>·</span>
          <span><b class="num" style="color:var(--st-done)">68%</b> 故事点完成</span>
        </div>
      </div>
      <div class="top-sp"></div>
      <div class="feishu-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        机器人已同步
      </div>
      <button class="icon-btn" title="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      </button>
      <button class="icon-btn" title="通知">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
        新建
      </button>
    </header>

    <!-- 工具行 -->
    <div class="toolbar">
      <div class="seg">
        <button class="on">看板</button>
        <button>表格</button>
        <button>时间线</button>
      </div>
      <div class="chip-flat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
        筛选
      </div>
      <div class="chip-flat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="7" r="3"/><path d="M3 19c0-2.8 2.7-4.5 6-4.5"/><circle cx="17" cy="9" r="3"/></svg>
        经办人
      </div>
      <div class="chip-flat">分组:状态</div>
      <div style="flex:1"></div>
      <span class="label">共 32 个工单 · 故事点 <b class="num" style="color:var(--ink)">47</b>/68</span>
      <div class="facepile" style="margin-left:4px">
        <div class="av sm av-chen">陈</div>
        <div class="av sm av-zhou">周</div>
        <div class="av sm av-gao">高</div>
        <div class="av sm av-han">韩</div>
      </div>
    </div>

    <!-- 看板 -->
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>
</div>

<script src="shell.js"></script>
<script>
const COLS = [
  {key:'todo',   t:'待办',   bar:'var(--st-todo)'},
  {key:'doing',  t:'进行中', bar:'var(--st-doing)'},
  {key:'review', t:'评审',   bar:'var(--st-review)'},
  {key:'test',   t:'测试',   bar:'#8a6b9a'},
  {key:'done',   t:'已完成', bar:'var(--st-done)'},
];
const CARDS = {
  todo:[
    {wid:'SRCH-218',type:'story',title:'搜索结果页支持「按团队/项目」二级聚合',pts:5,pri:1,who:['chen'],tags:['前端','埋点'],accent:'var(--st-todo)'},
    {wid:'SRCH-224',type:'tech',title:'统一检索网关的超时与降级策略',pts:8,pri:2,who:['he'],tags:['架构'],accent:'var(--st-todo)'},
    {wid:'SRCH-231',type:'task',title:'整理近 30 天高频空结果 query 清单',pts:2,pri:3,who:['lin'],tags:['数据'],accent:'var(--st-todo)'},
    {wid:'SRCH-205',type:'story',title:'移动端搜索框联想词支持键盘上下选择',pts:3,pri:2,who:['zhou'],tags:['前端','无障碍'],accent:'var(--st-todo)'},
  ],
  doing:[
    {wid:'SRCH-198',type:'story',title:'召回阶段引入语义向量检索(beta 开关)',pts:8,pri:1,who:['gao','su'],tags:['后端','算法'],prog:55,accent:'var(--st-doing)'},
    {wid:'SRCH-209',type:'bug',title:'空格开头的 query 命中率骤降',pts:3,pri:1,who:['su'],tags:['后端'],prog:70,accent:'var(--st-block)'},
    {wid:'SRCH-212',type:'story',title:'结果卡片重设计 · 摘要高亮与来源标',pts:5,pri:2,who:['chen','jiang'],tags:['前端','设计'],prog:40,accent:'var(--st-doing)'},
  ],
  review:[
    {wid:'SRCH-186',type:'story',title:'搜索历史与「我的收藏」打通',pts:5,pri:2,who:['zhou'],tags:['前端'],accent:'var(--st-review)',rev:'高远'},
    {wid:'SRCH-201',type:'tech',title:'检索日志接入多维表格做留存分析',pts:3,pri:3,who:['lin'],tags:['飞书','数据'],accent:'var(--st-review)',rev:'何川',feishu:1},
  ],
  test:[
    {wid:'SRCH-177',type:'story',title:'联想词接口缓存与防抖',pts:3,pri:2,who:['gao'],tags:['后端'],accent:'#8a6b9a',qa:'韩雪',prog:80},
    {wid:'SRCH-190',type:'bug',title:'高亮在中英混排下偶发错位',pts:2,pri:2,who:['chen'],tags:['前端'],accent:'#8a6b9a',qa:'韩雪',prog:60},
  ],
  done:[
    {wid:'SRCH-164',type:'story',title:'搜索入口信息架构调整',pts:5,pri:2,who:['chen'],tags:['前端'],accent:'var(--st-done)'},
    {wid:'SRCH-170',type:'tech',title:'检索指标看板上线(P95 / 空结果率)',pts:5,pri:1,who:['he'],tags:['架构'],accent:'var(--st-done)'},
    {wid:'SRCH-159',type:'task',title:'竞品搜索体验调研纪要',pts:2,pri:3,who:['jiang'],tags:['设计'],accent:'var(--st-done)'},
  ],
};
const AVN = {lin:['林','av-lin'],chen:['陈','av-chen'],zhou:['周','av-zhou'],gao:['高','av-gao'],su:['苏','av-su'],he:['何','av-he'],han:['韩','av-han'],jiang:['江','av-jiang']};
const TYPE = {story:['S','t-story'],bug:['B','t-bug'],task:['T','t-task'],tech:['D','t-tech']};
const flag = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 21V4M5 4h11l-2 3 2 3H5"/></svg>';

function avs(who){return who.map(w=>`<div class="av sm ${AVN[w][1]}">${AVN[w][0]}</div>`).join('');}
function card(c){
  const pri = c.pri===1?`<span class="pri p1">${flag}高</span>`:c.pri===2?`<span class="pri p2">${flag}中</span>`:`<span class="pri p3">${flag}低</span>`;
  const tags = c.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  const note = c.rev?`<span class="label" style="letter-spacing:.04em">评审 · ${c.rev}</span>`
              : c.qa?`<span class="label" style="letter-spacing:.04em">测试 · ${c.qa}</span>`:'';
  const bar = c.prog!=null?`<div class="subbar"><i style="width:${c.prog}%"></i></div>`:'';
  const fs = c.feishu?`<span class="feishu-dot" style="padding:1px 7px;font-size:9.5px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>飞书</span>`:'';
  return `<div class="card">
    <div class="card-accent" style="background:${c.accent}"></div>
    <div class="card-top">
      <div class="card-top-l">
        <span class="type-tag ${TYPE[c.type][1]}">${TYPE[c.type][0]}</span>
        <span class="wid">${c.wid}</span>
      </div>
      ${pri}
    </div>
    <div class="card-title">${c.title}</div>
    <div class="card-tags">${tags}${fs}</div>
    ${bar}
    <div class="card-meta">
      <div class="card-meta-l">${note}</div>
      <div class="card-meta-l" style="gap:8px">
        <span class="pts">${c.pts}<small>pt</small></span>
        <div class="facepile">${avs(c.who)}</div>
      </div>
    </div>
  </div>`;
}
document.getElementById('board').innerHTML = COLS.map(col=>{
  const list = CARDS[col.key]||[];
  const pts = list.reduce((s,c)=>s+c.pts,0);
  return `<div class="col">
    <div class="col-h">
      <span class="col-bar" style="background:${col.bar};max-width:18px"></span>
      <span class="col-t">${col.t}</span>
      <span class="col-n">${list.length}</span>
      <span style="flex:1"></span>
      <span class="label">${pts}pt</span>
    </div>
    <div class="col-body">${list.map(card).join('')}</div>
  </div>`;
}).join('');
</script>
</body>
</html>
