<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>每日站会 · Sprint 24</title>
<link rel="stylesheet" href="styles.css">
<style>
  .su-body{flex:1;min-height:0;overflow:auto;padding:0 26px 28px}
  .su-head{display:flex;align-items:flex-end;justify-content:space-between;padding:22px 0 16px;border-bottom:1.5px solid var(--rule-2);margin-bottom:4px}
  .su-date .d{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .su-date .w{font-size:12px;color:var(--ink-3);margin-top:5px}
  .su-meta{display:flex;gap:30px;align-items:flex-end}
  .su-meta .it{text-align:right}
  .su-meta .it .stat-num{font-size:26px}
  .su-meta .it .label{margin-top:3px}
  .cols-h{display:grid;grid-template-columns:210px minmax(0,1fr) minmax(0,1fr) 260px;gap:0;padding:14px 0 11px;border-bottom:1px solid var(--rule)}
  .cols-h .label{padding:0 16px}
  .su-row{display:grid;grid-template-columns:210px minmax(0,1fr) minmax(0,1fr) 260px;gap:0;border-bottom:1px solid var(--rule);min-height:96px}
  .su-row:hover{background:var(--paper-raised)}
  .su-cell{padding:16px;border-right:1px solid var(--rule);min-width:0}
  .su-cell:last-child{border-right:0}
  .su-who{display:flex;align-items:center;gap:11px}
  .su-who .nm{font-size:13.5px;font-weight:600}
  .su-who .rl{font-size:11px;color:var(--ink-3)}
  .su-who .speak{margin-top:8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:5px}
  .upd{display:flex;gap:9px;align-items:baseline;font-size:12.5px;line-height:1.5;margin-bottom:7px}
  .upd:last-child{margin-bottom:0}
  .upd .wid{flex:0 0 auto}
  .upd span:last-child{min-width:0;text-wrap:pretty}
  .upd .tick{color:var(--st-done);flex:0 0 auto}
  .upd .arrow{color:var(--ink-3);flex:0 0 auto}
  .blk{background:var(--st-block-bg);border:1px solid #e6c5bd;border-radius:var(--r-chip);padding:9px 11px;font-size:12px;color:#883a2d;line-height:1.45}
  .blk .bt{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:4px}
  .no-blk{font-size:12px;color:var(--ink-4);display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="app">
  <div id="side" data-active="standup"></div>
  <div class="main">
    <header class="top">
      <div class="top-title">
        <h1>每日站会</h1>
        <div class="sub"><span>Sprint 24 · 搜索体验重构</span><span>·</span><span>第 7 / 10 天</span></div>
      </div>
      <div class="top-sp"></div>
      <div class="feishu-dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>关联飞书日历 · 每日 10:00</div>
      <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>推送纪要到群</button>
    </header>

    <div class="su-body">
      <div class="su-head">
        <div class="su-date">
          <div class="d">06 / 06</div>
          <div class="w">星期五 · 站会 10:00–10:15</div>
        </div>
        <div class="su-meta">
          <div class="it"><div class="stat-num" style="font-size:26px">7<span style="font-size:13px;color:var(--ink-3)">/8</span></div><div class="label">已同步</div></div>
          <div class="it"><div class="stat-num" style="font-size:26px;color:var(--st-block)">2</div><div class="label">阻塞项</div></div>
          <div class="it"><div class="stat-num" style="font-size:26px;color:var(--st-done)">9</div><div class="label">昨日完成</div></div>
        </div>
      </div>

      <div class="cols-h">
        <div class="label">成员</div>
        <div class="label">昨日完成</div>
        <div class="label">今日计划</div>
        <div class="label">阻塞 / 求助</div>
      </div>

      <div id="su"></div>
    </div>
  </div>
</div>

<script src="shell.js"></script>
<script>
const AVN = {lin:'av-lin',chen:'av-chen',zhou:'av-zhou',gao:'av-gao',su:'av-su',he:'av-he',han:'av-han',jiang:'av-jiang'};
const tick = '<svg class="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" style="width:13px;height:13px"><path d="M5 12l4 4 10-10"/></svg>';
const arr  = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

const ROWS = [
  {k:'gao',nm:'高远',rl:'后端 · 召回',speaking:true,
    y:[['SRCH-177','联想词缓存联调通过']],
    t:[['SRCH-198','向量召回 beta 开关接入']],
    blk:'语义服务的 GPU 资源还没批,影响 198 压测。需何川协助走审批。'},
  {k:'su',nm:'苏晴',rl:'后端 · 语义',
    y:[['SRCH-209','定位空格 query 解析 bug']],
    t:[['SRCH-209','提修复 PR 并补单测'],['SRCH-198','协同高远联调']],
    blk:''},
  {k:'chen',nm:'陈牧',rl:'前端 · 结果页',
    y:[['SRCH-164','搜索入口 IA 调整上线'],['SRCH-190','高亮错位定位中']],
    t:[['SRCH-212','结果卡片摘要高亮']],
    blk:'结果卡片视觉稿等江月今天给到终版。'},
  {k:'zhou',nm:'周屿',rl:'前端 · 移动端',
    y:[['SRCH-186','历史/收藏打通自测完成']],
    t:[['SRCH-186','跟进高远评审意见'],['SRCH-205','移动端联想词键盘交互']],
    blk:''},
  {k:'han',nm:'韩雪',rl:'测试 · QA',
    y:[['SRCH-177','缓存用例回归通过']],
    t:[['SRCH-190','中英混排高亮专项测试']],
    blk:''},
  {k:'he',nm:'何川',rl:'架构 · 网关',
    y:[['SRCH-170','指标看板上线观察']],
    t:[['SRCH-224','网关降级策略设计评审']],
    blk:''},
  {k:'lin',nm:'林夏',rl:'负责人 · PM',
    y:[['','整理空结果 query,同步产品']],
    t:[['SRCH-201','日志接入多维表格(待审批)']],
    blk:''},
  {k:'jiang',nm:'江月',rl:'设计 · 体验',pending:true,
    y:[['','结果卡片视觉细化']],
    t:[['SRCH-212','交付终版标注']],
    blk:''},
];
function lines(arr_, icon){
  return arr_.map(([wid,txt])=>`<div class="upd">${icon}${wid?`<span class="wid">${wid}</span>`:''}<span>${txt}</span></div>`).join('');
}
document.getElementById('su').innerHTML = ROWS.map(r=>`
  <div class="su-row">
    <div class="su-cell">
      <div class="su-who">
        <div class="av lg ${AVN[r.k]}">${r.nm[0]}</div>
        <div><div class="nm">${r.nm}</div><div class="rl">${r.rl}</div></div>
      </div>
      ${r.speaking?'<div class="speak"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block"></span>正在发言</div>':r.pending?'<div class="speak" style="color:var(--ink-4)">待同步</div>':''}
    </div>
    <div class="su-cell">${lines(r.y,tick)}</div>
    <div class="su-cell">${lines(r.t,arr)}</div>
    <div class="su-cell">${r.blk?`<div class="blk"><div class="bt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:12px;height:12px"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>阻塞</div>${r.blk}</div>`:`<div class="no-blk">— 无阻塞</div>`}</div>
  </div>`).join('');
</script>
</body>
</html>
